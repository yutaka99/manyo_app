<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万葉の窓 - 屋外専用解説App</title>
    <style>
        /* 1. 屋外特化型高コントラストCSS */
        body {
            background-color: #000000; /* 漆黒背景 */
            color: #ffffff; /* 純白文字 */
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* 全体コンテナ */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 24px 16px 80px 16px; /* 下部に余白を空ける */
        }

        /* エラー・初期状態のメッセージ */
        .message-box {
            text-align: center;
            padding: 40px 20px;
            border: 2px dashed #ffd700;
            border-radius: 8px;
            margin-top: 20px;
        }

        /* 植物解説コンテンツ */
        .plant-content {
            display: none; /* 初期状態は非表示 */
        }

        .plant-name {
            font-size: 2.2rem;
            font-weight: bold;
            color: #ffffff;
            margin: 0 0 8px 0;
            border-bottom: 3px solid #ffd700; /* 黄金のアンダーライン */
            padding-bottom: 8px;
        }

        /* 万葉集の歌の表示エリア */
        .waka-section {
            background-color: #111111;
            border-left: 5px solid #ffd700;
            padding: 20px;
            margin: 24px 0;
            border-radius: 0 8px 8px 0;
        }

        .waka-text {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ffd700; /* 黄金色で視認性最大化 */
            margin: 0 0 12px 0;
            letter-spacing: 0.1rem;
        }

        .waka-yomi {
            font-size: 1.1rem;
            color: #aaaaaa;
            margin: 0;
        }

        /* 現代語訳・解説 */
        .section-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffd700;
            margin: 24px 0 8px 0;
        }

        .text-block {
            font-size: 1.2rem;
            color: #ffffff;
            margin: 0 0 20px 0;
            font-weight: 500; /* 少し太めにして屋外で見やすく */
        }

        /* フッター（デバッグ・案内用ナビゲーション） */
        .footer-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #111111;
            border-top: 1px solid #333333;
            padding: 12px 0;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .nav-btn {
            background-color: #222222;
            color: #ffd700;
            border: 1px solid #ffd700;
            padding: 8px 16px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: bold;
        }
        .nav-btn:active {
            background-color: #ffd700;
            color: #000000;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="welcome-message" class="message-box">
            <h2 style="color: #ffd700; margin-top: 0;">万葉の窓</h2>
            <p style="font-size: 1.2rem;">園内の木札にあるQRコードをスマートフォンで読み取ると、ここに解説が瞬時に表示されます。</p>
            <p style="font-size: 0.9rem; color: #888888;">（一度読み込めば、電波がなくても動きます）</p>
        </div>

        <div id="plant-display" class="plant-content">
            <h1 id="view-name" class="plant-name">植物名</h1>
            
            <div class="waka-section">
                <p class="section-title" style="margin-top:0; color:#aaaaaa;">【万葉集の歌】</p>
                <p id="view-waka" class="waka-text">歌がここに表示されます</p>
                <p id="view-yomi" class="waka-yomi">よみがながここに表示されます</p>
            </div>

            <p class="section-title">【現代語訳】</p>
            <p id="view-translation" class="text-block">現代語訳がここに表示されます。</p>

            <p class="section-title">【植物と歴史の解説】</p>
            <p id="view-description" class="text-block">過酷な環境を生き抜く植物の解説がここに表示されます。</p>
        </div>
    </div>

    <div class="footer-nav">
        <div class="nav-item"><a href="#" class="nav-btn">ホーム</a></div>
        <div class="nav-item"><a href="#camera" class="nav-btn" style="border-color: #38bdf8; color: #38bdf8;">📷 カメラ</a></div>
        <div class="nav-item"><a href="#hagi" class="nav-btn">萩</a></div>
        <div class="nav-item"><a href="#matsu" class="nav-btn">松</a></div>
        <div class="nav-item"><a href="#ume" class="nav-btn">梅</a></div>
    </div>

    <script>
        /* 2. オフライン動作のための植物データ内包（JSONオブジェクト） */
        const plantDatabase = {
            "hagi": {
                name: "萩（ハギ）",
                waka: "高円の 秋の野をすゑ 萩の花 妻をめとめんと 鹿鳴く宿しも",
                yomi: "たかまどの あきののをおえ はぎのはな つまをめとめんと しかなくやどしも",
                translation: "高円の秋の野の一面に咲いている萩の花よ。その花の中で、妻を求めようとして鹿が鳴いている、なんと風情のある場所なのだろう。",
                description: "万葉集の中で最も多く詠まれている（140首以上）植物です。秋の七草の筆頭であり、荒れ地でも力強く育つ特性を持っています。既存の看板では文字がかすれて見えなくなっていましたが、このデジタル解説により、当時の人々が愛した鮮やかな紫色の情景が鮮明に蘇ります。"
            },
            "matsu": {
                name: "松（マツ）",
                waka: "磐代の 浜松が枝を 引き結び ま幸くあらば また帰り見む",
                yomi: "いわしろの はままつがえを ひきむすび まさきくあらば またかえりみむ",
                translation: "磐代の浜辺にある松の枝を結び合わせて無事を祈る。もし命が無事であったなら、またここに戻ってきてこの松を見よう。",
                description: "謀反の罪で捕らえられた有間皇子が、護送される途中に命の無事を祈って松の枝を結んだ悲劇的な歌です。松は「待つ」や「祀る」に通じ、神聖で変わらない強さの象徴として多くの歌に登場します。園内の静寂な松林の中でこの解説を読むことで、皇子の孤独な心情に深く没入できます。"
            },
            "ume": {
                name: "梅（ウメ）",
                waka: "我が園に 梅の花散る ひさかたの 天より雪の 流れ来るかも",
                yomi: "わがそのに うめのはなちる ひさかたの あめよりゆきの ながれくるかも",
                translation: "私の庭に梅の花が散っている。まるで遥か高い天から、雪が流れ落ちてくるかのようである。",
                description: "令和の元号の由来となった「梅花の宴」の序文にもあるように、万葉時代において梅は中国から伝わったばかりの「最先端の洗練された花」として熱狂的に愛されました。直射日光下でもハッキリ見えるこの画面で、当時の貴族たちが雪に見立てて楽しんだ白梅の美しさに思いを馳せることができます。"
            }
        };

        /* 3. ハッシュ切り替えによるゼロ通信制御ロジック */
        function renderPlant() {
            // URLの末尾（#hagi など）から # を除いた文字列を取得
            const hash = window.location.hash.substring(1);
            
            const welcomeBox = document.getElementById('welcome-message');
            const displayBox = document.getElementById('plant-display');

            if (hash && plantDatabase[hash]) {
                // 該当データがある場合、要素を書き換えて表示
                const data = plantDatabase[hash];
                document.getElementById('view-name').innerText = data.name;
                document.getElementById('view-waka').innerText = data.waka;
                document.getElementById('view-yomi').innerText = data.yomi;
                document.getElementById('view-translation').innerText = data.translation;
                document.getElementById('view-description').innerText = data.description;

                welcomeBox.style.display = 'none';
                displayBox.style.display = 'block';
                
                // 画面を最上部にスクロール
                window.scrollTo(0, 0);
            } else {
                // ハッシュがない、またはデータがない場合は初期画面
                welcomeBox.style.display = 'block';
                displayBox.style.display = 'none';
            }
        }

        // URLのハッシュが変更された時（QRコードが読み込まれた時など）に実行
        window.addEventListener('hashchange', renderPlant);
        
        // ページが最初に読み込まれた時にも実行
        window.addEventListener('DOMContentLoaded', renderPlant);
    </script>
</body>
</html>
